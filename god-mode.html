<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Universe Core — Private Admin Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { height: 100%; margin: 0; }
    .chat-scroll {
      scrollbar-width: thin;
      scrollbar-color: #4b5563 #0f172a;
      scroll-behavior: smooth;
    }
    .chat-scroll::-webkit-scrollbar { width: 10px; }
    .chat-scroll::-webkit-scrollbar-thumb {
      background: #4b5563;
      border-radius: 10px;
    }
    .prose-markdown { line-height: 1.65; color: #d4d4d4; }
    .prose-markdown h1, .prose-markdown h2, .prose-markdown h3 {
      font-weight: 700;
      margin: 0.75rem 0 0.35rem;
      color: #f3f4f6;
    }
    .prose-markdown h1 { font-size: 1.2rem; }
    .prose-markdown h2 { font-size: 1.05rem; }
    .prose-markdown h3 { font-size: 0.95rem; }
    .prose-markdown p { margin: 0.35rem 0; }
    .prose-markdown strong { color: #f9fafb; font-weight: 700; }
    .prose-markdown ul, .prose-markdown ol { margin: 0.35rem 0 0.35rem 1.1rem; }
    .prose-markdown code:not(pre code) {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.85em;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #334155;
      border-radius: 0.35rem;
      padding: 0.1rem 0.35rem;
    }
    .prose-markdown pre.code-block-frame {
      position: relative;
      margin: 0.65rem 0;
      padding: 0.85rem 0.75rem 0.75rem;
      border-radius: 0.65rem;
      border: 1px solid #334155;
      background: #0b1220;
      overflow-x: auto;
    }
    .prose-markdown table {
      display: block;
      width: 100%;
      overflow-x: auto;
      border-collapse: collapse;
    }
    .prose-markdown th, .prose-markdown td {
      border: 1px solid #334155;
      padding: 0.35rem 0.5rem;
    }
    .copy-code-btn {
      position: absolute;
      top: 0.45rem;
      right: 0.45rem;
      z-index: 2;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.25rem 0.55rem;
      border-radius: 0.4rem;
      border: 1px solid #475569;
      background: rgba(30, 41, 59, 0.95);
      color: #e2e8f0;
      cursor: pointer;
    }
    .copy-code-btn:hover { background: #334155; }
    body.god-mode-active { overflow: hidden; }
    #godApp.god-mode-fullscreen {
      position: fixed;
      inset: 0;
      z-index: 50;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #1e1e1e;
      overflow: hidden;
    }
    #godmodePanels.god-mode-workspace-shell {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
</head>
<body class="h-full bg-[#1e1e1e] text-white antialiased">
  <div id="godApp" class="h-full flex flex-col">
    <div id="godAuthGate" class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-[#0b0f17] via-[#111827] to-[#1e1e1e]">
      <div class="w-full max-w-md rounded-2xl border border-[#3c3c3c] bg-[#252526] p-6 shadow-2xl space-y-4">
        <p class="text-xs uppercase tracking-[0.2em] text-[#4ec9b0] font-semibold text-center">Private Operator Console</p>
        <h1 class="text-xl font-bold text-center">Admin Chat Panel</h1>
        <p class="text-sm text-[#858585] text-center">Requires <code class="text-[#9cdcfe]">sk_god_master_...</code> or authorized master key.</p>
        <label class="block text-xs text-[#858585] uppercase tracking-wide">API Base URL</label>
        <input id="apiBase" type="url" class="w-full rounded-lg bg-[#1e1e1e] border border-[#3c3c3c] px-3 py-2 text-sm text-white" />
        <label class="block text-xs text-[#858585] uppercase tracking-wide">God Mode Master Key</label>
        <input id="adminKey" type="password" placeholder="sk_god_master_..." class="w-full rounded-lg bg-[#1e1e1e] border border-[#3c3c3c] px-3 py-2 text-sm text-white" />
        <button id="unlockGodModeBtn" type="button" class="w-full rounded-lg bg-[#007acc] hover:bg-[#1a8ad4] text-white font-semibold py-2.5 text-sm">Unlock Admin Chat</button>
        <p class="text-[11px] text-center"><a href="index.html" class="text-[#3794ff] hover:underline">← Public dashboard</a></p>
      </div>
    </div>

    <div id="godmodePanels" class="hidden flex-1 min-h-0 w-full flex flex-col overflow-hidden bg-[#1e1e1e]">
      <header class="shrink-0 h-12 px-6 md:px-12 border-b border-[#2b2b2b] bg-[#252526] flex items-center justify-between gap-3">
        <div class="flex items-center gap-2 min-w-0">
          <span class="text-[#007acc]">●</span>
          <h1 class="text-sm font-semibold text-[#cccccc] truncate">AI Universe · Private Admin Chat</h1>
        </div>
        <p id="godStatusPill" class="text-[11px] text-[#858585] shrink-0">Dolphin · Master bypass</p>
      </header>

      <div id="godDirectChatHistory" class="chat-scroll flex-1 overflow-y-auto overflow-x-hidden w-full px-6 md:px-12 py-6 space-y-4 min-h-0"></div>

      <footer class="shrink-0 border-t border-[#2b2b2b] bg-[#252526] px-6 md:px-12 py-4">
        <div class="w-full flex items-end gap-3">
          <textarea
            id="godDirectChatInput"
            rows="1"
            placeholder="Message the admin AI (uncensored, full bypass)…"
            class="flex-1 resize-none rounded-2xl bg-[#1e1e1e] border border-[#3c3c3c] px-4 py-3 text-sm text-white placeholder:text-[#6e6e6e] focus:outline-none focus:ring-1 focus:ring-[#007acc] min-h-[48px] max-h-40"
          ></textarea>
          <button id="godDirectChatSendBtn" type="button" class="shrink-0 rounded-xl bg-[#007acc] hover:bg-[#1a8ad4] text-white font-semibold px-5 py-3 text-sm">
            Send
          </button>
        </div>
      </footer>
    </div>
  </div>

  <div id="toastHost" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

  <script>
    const PRODUCTION_API_BASE = 'https://ai-universe-core.onrender.com/';
    const REGISTERED_EMAIL = 'demoa2735@gmail.com';
    const TRUNCATION_BADGE = '[TRUNCATED_BADGE_ACTIVE]';

    const STORAGE_KEYS = {
      adminKey: 'auc_admin_key',
      godMasterApiKey: 'auc_god_master_api_key',
    };

    let markdownRenderRaf = 0;

    const state = {
      adminUnlocked: false,
      chatMessages: [],
    };

    if (window.marked) {
      marked.setOptions({ breaks: true, gfm: true });
    }

    const el = {
      apiBase: document.getElementById('apiBase'),
      adminKey: document.getElementById('adminKey'),
      unlockGodModeBtn: document.getElementById('unlockGodModeBtn'),
      godmodePanels: document.getElementById('godmodePanels'),
      godAuthGate: document.getElementById('godAuthGate'),
      godApp: document.getElementById('godApp'),
      godDirectChatHistory: document.getElementById('godDirectChatHistory'),
      godDirectChatInput: document.getElementById('godDirectChatInput'),
      godDirectChatSendBtn: document.getElementById('godDirectChatSendBtn'),
      godStatusPill: document.getElementById('godStatusPill'),
      toastHost: document.getElementById('toastHost'),
    };

    function getApiBase() {
      return PRODUCTION_API_BASE.replace(/\/$/, '');
    }

    function getClientEmail() {
      return REGISTERED_EMAIL;
    }

    function withRegisteredEmail(payload) {
      return { ...payload, email: getClientEmail() };
    }

    function getAdminHeaders() {
      const adminKey = (el.adminKey.value || localStorage.getItem(STORAGE_KEYS.adminKey) || '').trim();
      return {
        'Content-Type': 'application/json',
        'x-master-admin-key': adminKey,
        Authorization: adminKey ? `Bearer ${adminKey}` : '',
        'x-user-email': REGISTERED_EMAIL,
        'X-Client-Email': REGISTERED_EMAIL,
        'Client-Email': REGISTERED_EMAIL,
      };
    }

    function isValidGodModeMasterKey(key) {
      const value = String(key || '').trim();
      return value.startsWith('sk_god_master_') || value.length >= 16;
    }

    function showToast(message, type) {
      const colors = {
        success: 'border-emerald-500/40 bg-emerald-500/10 text-emerald-200',
        error: 'border-red-500/40 bg-red-500/10 text-red-200',
        info: 'border-blue-500/40 bg-blue-500/10 text-blue-200',
        warn: 'border-amber-500/40 bg-amber-500/10 text-amber-200',
      };
      const node = document.createElement('div');
      node.className = `rounded-xl border px-4 py-3 text-sm shadow-lg ${colors[type] || colors.info}`;
      node.textContent = message;
      el.toastHost.appendChild(node);
      setTimeout(() => node.remove(), 5200);
    }

    function attachCopyCodeButtons(container) {
      if (!container) return;
      container.querySelectorAll('pre').forEach((pre) => {
        if (pre.dataset.copyBound === '1') return;
        pre.dataset.copyBound = '1';
        pre.classList.add('code-block-frame');
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'copy-code-btn';
        btn.textContent = 'Copy Code';
        btn.addEventListener('click', async () => {
          const code = pre.querySelector('code')?.innerText || pre.innerText;
          try {
            await navigator.clipboard.writeText(code);
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = 'Copy Code'; }, 1800);
          } catch {
            btn.textContent = 'Failed';
          }
        });
        pre.appendChild(btn);
      });
    }

    function renderMarkdownToElement(target, rawText) {
      if (!target) return;
      const text = String(rawText || '');
      if (!text.trim()) {
        target.textContent = '';
        return;
      }
      if (!window.marked) {
        target.textContent = text;
        return;
      }
      target.innerHTML = marked.parse(text);
      attachCopyCodeButtons(target);
      if (window.Prism) {
        target.querySelectorAll('pre code').forEach((block) => {
          Prism.highlightElement(block);
        });
      }
    }

    function scheduleMarkdownRender(target, rawText) {
      if (markdownRenderRaf) cancelAnimationFrame(markdownRenderRaf);
      markdownRenderRaf = requestAnimationFrame(() => {
        renderMarkdownToElement(target, rawText);
        markdownRenderRaf = 0;
      });
    }

    function appendGodDirectChatEntry(role, content) {
      const row = document.createElement('div');
      row.className = role === 'user' ? 'flex justify-end' : 'flex justify-start';

      const bubble = document.createElement('div');
      bubble.className = role === 'user'
        ? 'max-w-[90%] rounded-2xl rounded-tr-sm bg-[#007acc]/20 border border-[#007acc]/35 px-4 py-3 text-sm text-[#e8f4fc]'
        : 'max-w-[95%] rounded-2xl rounded-tl-sm bg-[#2d2d2d] border border-[#3c3c3c] px-4 py-3 text-sm';

      const label = document.createElement('p');
      label.className = 'text-[10px] uppercase tracking-wider mb-1.5 text-[#858585]';
      label.textContent = role === 'user' ? 'You' : 'Dolphin Admin';

      const body = document.createElement('div');
      body.className = role === 'assistant'
        ? 'prose-markdown leading-relaxed'
        : 'whitespace-pre-wrap leading-relaxed';

      if (role === 'assistant') {
        renderMarkdownToElement(body, content || '');
      } else {
        body.textContent = content || '';
      }

      bubble.appendChild(label);
      bubble.appendChild(body);
      row.appendChild(bubble);
      el.godDirectChatHistory.appendChild(row);
      el.godDirectChatHistory.scrollTop = el.godDirectChatHistory.scrollHeight;
      return { row, bubble, body };
    }

    async function apiRequest(path, options) {
      const url = `${getApiBase()}${path}`;
      const requestOptions = { ...options };

      if (requestOptions.body && typeof requestOptions.body === 'string') {
        try {
          const parsedBody = JSON.parse(requestOptions.body);
          requestOptions.body = JSON.stringify(withRegisteredEmail(parsedBody));
        } catch {
          // keep original body
        }
      }

      const response = await fetch(url, requestOptions);
      let payload = null;
      try {
        payload = await response.json();
      } catch {
        payload = { message: 'Non-JSON response received from API.' };
      }
      return { response, payload };
    }

    async function consumeGodSseStream(response, assistantNode) {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let fullText = '';

      while (true) {
        const { value, done } = await reader.read();
        if (value) {
          buffer += decoder.decode(value, { stream: true });
          const frames = buffer.split('\n\n');
          buffer = frames.pop() || '';

          for (const frame of frames) {
            const dataLine = frame
              .split('\n')
              .map((line) => line.trim())
              .find((line) => line.startsWith('data:'));

            if (!dataLine) continue;
            const payloadRaw = dataLine.replace(/^data:\s*/, '');
            if (!payloadRaw || payloadRaw === '[DONE]') continue;

            let payload;
            try {
              payload = JSON.parse(payloadRaw);
            } catch {
              continue;
            }

            if (payload.error) {
              throw new Error(payload.message || 'SSE stream reported an error.');
            }

            if (payload.type === 'meta') continue;

            if (payload.content && payload.content !== TRUNCATION_BADGE && !payload.truncated) {
              const chunk = payload.content.includes(TRUNCATION_BADGE)
                ? payload.content.replace(TRUNCATION_BADGE, '')
                : payload.content;
              fullText += chunk;
              scheduleMarkdownRender(assistantNode.body, fullText);
              el.godDirectChatHistory.scrollTop = el.godDirectChatHistory.scrollHeight;
            }
          }
        }
        if (done) {
          buffer += decoder.decode(undefined, { stream: false });
          if (buffer.trim()) {
            const dataLine = buffer.split('\n').find((line) => line.trim().startsWith('data:'));
            if (dataLine) {
              const payloadRaw = dataLine.replace(/^data:\s*/, '');
              if (payloadRaw && payloadRaw !== '[DONE]') {
                try {
                  const payload = JSON.parse(payloadRaw);
                  if (payload.content) fullText += String(payload.content).replace(TRUNCATION_BADGE, '');
                } catch {
                  // ignore trailing parse errors
                }
              }
            }
          }
          break;
        }
      }

      return fullText;
    }

    async function sendGodDirectChat() {
      if (!state.adminUnlocked) {
        showToast('Unlock Admin Chat with a valid master key first.', 'warn');
        return;
      }

      const prompt = el.godDirectChatInput.value.trim();
      if (!prompt) {
        showToast('Enter a message before sending.', 'warn');
        return;
      }

      appendGodDirectChatEntry('user', prompt);
      el.godDirectChatInput.value = '';
      el.godDirectChatSendBtn.disabled = true;

      const assistantNode = appendGodDirectChatEntry('assistant', '');

      try {
        const response = await fetch(`${getApiBase()}/api/chat`, {
          method: 'POST',
          headers: {
            ...getAdminHeaders(),
            Accept: 'text/event-stream',
          },
          body: JSON.stringify(withRegisteredEmail({
            prompt,
            stream: true,
          })),
        });

        const contentType = response.headers.get('content-type') || '';

        if (!response.ok && !contentType.includes('text/event-stream')) {
          let payload = {};
          try {
            payload = await response.json();
          } catch {
            payload = { message: `Admin chat failed (${response.status})` };
          }
          assistantNode.body.textContent = payload.message || `Error ${response.status}`;
          showToast(payload.message || 'Admin chat failed.', 'error');
          return;
        }

        if (contentType.includes('text/event-stream') && response.body) {
          const fullText = await consumeGodSseStream(response, assistantNode);

          if (!fullText.trim()) {
            assistantNode.body.textContent = 'No response content returned from model.';
          } else {
            renderMarkdownToElement(assistantNode.body, fullText);
            state.chatMessages.push({ role: 'user', content: prompt });
            state.chatMessages.push({ role: 'assistant', content: fullText });
          }
        } else {
          const payload = await response.json();
          const text = payload.output || payload.message || JSON.stringify(payload, null, 2);
          renderMarkdownToElement(assistantNode.body, text);
        }

        showToast('Response completed.', 'success');
      } catch (error) {
        assistantNode.body.textContent = error.message || 'Network failure during admin chat.';
        showToast(error.message || 'Admin chat failed.', 'error');
      } finally {
        el.godDirectChatSendBtn.disabled = false;
        el.godDirectChatHistory.scrollTop = el.godDirectChatHistory.scrollHeight;
      }
    }

    function activateGodModeWorkspace() {
      el.godAuthGate?.classList.add('hidden');
      el.godApp?.classList.add('god-mode-fullscreen');
      el.godmodePanels?.classList.remove('hidden');
      el.godmodePanels?.classList.add('god-mode-workspace-shell');
      document.body.classList.add('god-mode-active');
    }

    function unlockGodMode() {
      const key = el.adminKey.value.trim();
      if (!isValidGodModeMasterKey(key)) {
        showToast('Enter a valid God Mode master key (sk_god_master_...).', 'warn');
        return;
      }
      localStorage.setItem(STORAGE_KEYS.adminKey, key);
      state.adminUnlocked = true;
      showToast('Admin chat session unlocked.', 'success');
      activateGodModeWorkspace();
      appendGodDirectChatEntry('assistant', 'Admin chat online. Master bypass active — send any prompt for uncensored Dolphin responses via `POST /api/chat`.');
    }

    function loadPersistedValues() {
      el.apiBase.value = getApiBase();
      el.adminKey.value = localStorage.getItem(STORAGE_KEYS.adminKey) || '';
      if (el.adminKey.value && isValidGodModeMasterKey(el.adminKey.value)) {
        state.adminUnlocked = true;
        activateGodModeWorkspace();
      }
    }

    async function checkHealth() {
      try {
        const { response, payload } = await apiRequest('/health', { method: 'GET' });
        if (response.ok && state.adminUnlocked && el.godStatusPill) {
          const redisHint = payload.redis ? ` · ${payload.redis}` : '';
          el.godStatusPill.textContent = `Online · ${payload.status || 'healthy'}${redisHint}`;
        }
      } catch {
        if (state.adminUnlocked && el.godStatusPill) {
          el.godStatusPill.textContent = 'API unreachable';
        }
      }
    }

    function bindEvents() {
      el.unlockGodModeBtn.addEventListener('click', unlockGodMode);
      el.adminKey.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          unlockGodMode();
        }
      });
      el.godDirectChatSendBtn.addEventListener('click', sendGodDirectChat);
      el.godDirectChatInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          sendGodDirectChat();
        }
      });
    }

    loadPersistedValues();
    bindEvents();
    checkHealth();

    if (!state.adminUnlocked) {
      showToast('Enter your God Mode master key to access the admin chat.', 'info');
    }
  </script>
</body>
</html>
